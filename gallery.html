    <style>

        /* ================= GALLERY ================= */

        .gallery-img{

            width:100%;
            height:350px;
            object-fit:cover;

            border-radius:15px;

            transition:0.4s;
            cursor:pointer;

            box-shadow:0 5px 15px rgba(0,0,0,0.15);

        }

        .gallery-img:hover{

            transform:scale(1.05);

        }

        /* ================= TITLE ================= */

        .section-title{

            color:#d89b2b;
            font-size:55px;
            font-weight:700;

        }

        #service-title{

            font-size:40px;
            margin-top:20px;
            margin-bottom:25px;

        }

        /* ================= DESCRIPTION ================= */

        #service-desc{

            max-width:1100px;

            margin:auto;

            text-align:left;

            line-height:35px;

            font-size:18px;

            color:#444;

            margin-top:20px;
            margin-bottom:40px;

        }

        .point-line{

            margin-bottom:12px;

            padding-left:10px;

        }

        /* ================= FULLSCREEN ================= */

        .fullscreen{

            position:fixed;

            top:0;
            left:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.95);

            display:none;

            align-items:center;
            justify-content:center;

            z-index:9999;

        }

        .fullscreen img{

            max-width:90%;
            max-height:85%;

            border-radius:15px;

        }

        /* ================= CLOSE BUTTON ================= */

        .close-btn{

            position:absolute;

            top:20px;
            right:30px;

            background:#fff;

            border:none;

            padding:10px 20px;

            border-radius:30px;

            font-weight:600;

            transition:0.3s;

        }

        .close-btn:hover{

            background:#d89b2b;
            color:#fff;

        }

        /* ================= MOBILE ================= */

        @media(max-width:768px){

            .section-title{

                font-size:40px;

            }

            #service-title{

                font-size:28px;

            }

            #service-desc{

                font-size:16px;
                line-height:30px;

            }

            .gallery-img{

                height:250px;

            }

        }

    </style>
